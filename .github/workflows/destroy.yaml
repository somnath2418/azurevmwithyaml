name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment to destroy"
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 🔐 Azure Login (OIDC)
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 🔥 Init with correct state file
      - name: Terraform Init
        run: |
          terraform init \
          -backend-config="resource_group_name=tfstate-rg" \
          -backend-config="storage_account_name=somseema23tf" \
          -backend-config="container_name=tfstate" \
          -backend-config="key=terraform-${{ github.event.inputs.environment }}.tfstate"

      # 🔍 Plan destroy (safety step)
      - name: Terraform Destroy Plan
        run: |
          terraform plan -destroy \
          -var="environment=${{ github.event.inputs.environment }}" \
          -var="admin_password=${{ secrets.ADMIN_PASSWORD }}" \
          -out=destroyplan

      # 🚫 Prevent accidental prod destroy
      - name: Manual Approval for Prod
        if: github.event.inputs.environment == 'prod'
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: somnath2418
          minimum-approvals: 1

      # 💣 Destroy resources
      - name: Terraform Destroy
        run: |
          terraform apply -auto-approve
